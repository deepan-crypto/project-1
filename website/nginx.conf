server {
    listen 80;
    server_name _;

    root /var/www/thoughts;
    index index.html;

    # Allow image uploads up to 10MB
    client_max_body_size 10M;

    # API requests — proxy to Node.js backend on port 5000
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large file uploads to pass through
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Profile picture uploads — proxy to backend static files
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Android App Links — must not be cached
    location /.well-known/ {
        try_files $uri =404;
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache, no-store";
    }

    # Website SPA — serve index.html for all routes (fixes 404 on /poll/:id)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
